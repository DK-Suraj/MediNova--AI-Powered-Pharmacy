<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart - Pharmacy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">🛒 Your Cart</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Medicine</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.medicine.name}"></td>
            <td>₹ <span th:text="${item.medicine.price}"></span></td>
            <td th:text="${item.quantity}"></td>
            <td>₹ <span th:text="${item.medicine.price * item.quantity}"></span></td>
            <td>
                <a th:href="@{'/cart/increase/' + ${item.id}}" class="btn btn-sm btn-success">+</a>
                <a th:href="@{'/cart/decrease/' + ${item.id}}" class="btn btn-sm btn-warning">-</a>
                <a th:href="@{'/cart/delete/' + ${item.id}}" class="btn btn-sm btn-danger">x</a>
            </td>
        </tr>
        </tbody>
    </table>

    <h4 class="text-end">Total: ₹ <span th:text="${total}"></span></h4>

    <form th:action="@{/cart/checkout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success w-100 mt-3">✅ Place Order</button>
    </form>
</div>
</body>
</html>
