<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - MediNova</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap & Google Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height: 100vh;
        }

        .container {
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h5, .card p {
            color: white;
        }

        .btn-light {
            border-radius: 10px;
            font-weight: bold;
        }

        .logout-btn {
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: bold;
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>👋 Welcome, Admin!</h2>

    <div class="row">
        <!-- Medicines Card -->
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow p-4">
                <h5 class="card-title">💊 Medicines</h5>
                <p class="card-text">Add / Edit / Delete medicines</p>
                <a href="/medicine/list" class="btn btn-light">Manage Medicines</a>
            </div>
        </div>

        <!-- Customers Card -->
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow p-4">
                <h5 class="card-title">👥 Customers</h5>
                <p class="card-text">Add / Edit / Delete customers</p>
                <a href="/customer/list" class="btn btn-light">Manage Customers</a>
            </div>
        </div>

        <!-- Sales Card -->
        <div class="col-md-4 mb-4">
            <div class="card text-center shadow p-4">
                <h5 class="card-title">💰 Sales</h5>
                <p class="card-text">Add sales & view billing</p>
                <a href="/sale/list" class="btn btn-light">View Sales</a>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/admin/logout" class="btn btn-danger logout-btn">Logout</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
