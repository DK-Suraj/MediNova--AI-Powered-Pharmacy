<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sales List - Pharmacy Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .badge-online { background-color: #cfe2ff; color: #084298; border: 1px solid #b6d4fe; }
        .badge-offline { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📊 All Sales Records</h3>
        <div>
            <a href="/sale/add" class="btn btn-primary">Add Offline Sale</a>
            <a href="/user/home" class="btn btn-secondary">Home</a>
        </div>
    </div>

    <form th:action="@{/sale/search}" method="get" class="mb-4 d-flex" style="max-width: 400px;">
        <input type="text" name="keyword" class="form-control me-2" placeholder="Search by name...">
        <button type="submit" class="btn btn-outline-primary">Search</button>
    </form>

    <div class="table-container">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Phone</th>
                    <th>Medicine</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Date</th>
                    <th>Order Type</th> <th>Action</th>     </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${sales}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.customerName}"></td>
                    <td th:text="${s.phone}"></td>
                    <td th:text="${s.medicine.name}"></td>
                    <td th:text="${s.quantity}"></td>
                    <td><strong>₹ <span th:text="${s.totalPrice}"></span></strong></td>
                    <td th:text="${#temporals.format(s.saleDate, 'dd-MM-yyyy HH:mm')}"></td>
                    
                    <td>
                        <span class="badge" 
                              th:classappend="${s.saleType != null && s.saleType.name() == 'ONLINE' ? 'badge-online' : 'badge-offline'}"
                              th:text="${s.saleType}">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/sale/delete/{id}(id=${s.id})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Are you sure you want to delete this sale record?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(sales)}" class="text-center py-4">
            <p class="text-muted">No records found.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
