<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - MediNova</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            color: white;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-primary {
            background: #667eea;
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-light {
            border-radius: 10px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            color: white;
            box-shadow: none;
        }

        .text-danger {
            font-size: 0.875rem;
        }

        .alert {
            background: rgba(255,0,0,0.2);
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="card shadow">
    <h3 class="text-center mb-4">🔐 Admin Login</h3>

    <!-- Error Message -->
    <div th:if="${error}" class="alert text-center" th:text="${error}"></div>

    <form th:action="@{/admin/login}" th:object="${admin}" method="post">

        <div class="mb-3">
            <label>Username</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Enter username" required>
            <div th:if="${#fields.hasErrors('username')}" class="text-danger" th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" required>
            <div th:if="${#fields.hasErrors('password')}" class="text-danger" th:errors="*{password}"></div>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>

        <!-- Go to Home Button -->
        <a href="/" class="btn btn-light w-100 mt-3">🏠 Go to Home</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
