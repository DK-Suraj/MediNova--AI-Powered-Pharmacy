<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add / Edit Customer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 th:text="${customer.id == 0} ? 'Add Customer' : 'Edit Customer'"></h3>
        <form th:action="@{/customer/save}" th:object="${customer}" method="post">
            <div class="mb-3">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control">
                <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control">
                <div th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" class="form-control">
                <div th:if="${#fields.hasErrors('phone')}" class="text-danger" th:errors="*{phone}"></div>
            </div>
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/customer/list" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
