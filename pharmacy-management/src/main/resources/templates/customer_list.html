<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Customer List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h3>Customer List</h3>
    <form class="d-flex mb-3" th:action="@{/customer/search}" method="get">
        <input type="text" name="keyword" class="form-control me-2" placeholder="Search by name">
        <button type="submit" class="btn btn-outline-primary">Search</button>
    </form>
    <a href="/customer/add" class="btn btn-primary mb-3">Add Customer</a>
    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cust : ${customers}">
                <td th:text="${cust.id}"></td>
                <td th:text="${cust.name}"></td>
                <td th:text="${cust.email}"></td>
                <td th:text="${cust.phone}"></td>
                <td>
                    <a th:href="@{/customer/edit/{id}(id=${cust.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/customer/delete/{id}(id=${cust.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
