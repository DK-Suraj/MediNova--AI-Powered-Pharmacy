<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Home - MediNova</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Background */
        .bg-style {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1587854692152-cbe660dbde88');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glass Card */
        .card-glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            animation: fadeInUp 1.2s ease;
        }

        @keyframes fadeInUp {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .btn-primary {
            background: #667eea;
            border: none;
            margin: 10px 0;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-danger {
            box-shadow: 0 0 10px #ff4d4d;
            margin-top: 15px;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px #ff1a1a;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
<div class="bg-style">

    <div class="card-glass col-md-4 shadow">
        <h2 class="mb-4">👋 Welcome User</h2>

        <a href="/user/medicines" class="btn btn-primary w-100">💊 View Medicines</a>
        <a href="/cart/view" class="btn btn-success w-100 mt-2">🛒 View Cart</a>
        <a href="/user/logout" class="btn btn-danger w-100 mt-3">Logout</a>
    </div>

</div>
</body>
</html>
