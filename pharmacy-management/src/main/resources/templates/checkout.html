<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout - Pharmacy Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 15px; }
        .btn { border-radius: 10px; }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">💳 Checkout</h2>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 shadow">

                <h5 class="mb-3">Delivery Details</h5>
                <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
                <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
                <p><strong>Address:</strong> <span th:text="${user.address}"></span></p>

                <hr>

                <h5>Order Summary</h5>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Medicine</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td th:text="${item.medicine.name}"></td>
                            <td>₹ <span th:text="${item.medicine.price}"></span></td>
                            <td th:text="${item.quantity}"></td>
                            <td>₹ <span th:text="${item.medicine.price * item.quantity}"></span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="text-end">
                    <h5>Total Amount: ₹ <span th:text="${total}"></span></h5>
                </div>

				<form th:action="@{/cart/checkout/place}" method="post">
				    <button type="submit" class="btn btn-primary w-100 py-2">Confirm & Place Order</button>
				</form>

            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
