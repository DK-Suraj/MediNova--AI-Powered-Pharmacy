<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Medicines</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body { background:#f5f7fa; font-family: 'Poppins', sans-serif; }
        .card { border-radius:15px; }
        .search-box{ max-width:400px; margin:auto; }
    </style>
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>💊 Medicines</h3>
        <div>
            <a href="/cart/view" class="btn btn-success">🛒 Cart</a>
            <a href="/user/home" class="btn btn-primary">🏠 Home</a>
            <a href="/user/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <div class="search-box mb-4">
        <input type="text" id="aiSearch" class="form-control" placeholder="🤖 Search Medicine...">
        <ul id="aiResult" class="list-group mt-2"></ul>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="med : ${medicines}">
            <div class="card shadow p-3">
                <h5>💊 <span th:text="${med.name}">Medicine Name</span></h5>
                <p>Price: ₹ <span th:text="${med.price}">0</span></p>
                <p>Stock: <span th:text="${med.quantity}">0</span></p>
                <a th:href="@{'/cart/add/' + ${med.id}}" class="btn btn-primary w-100">➕ Add to Cart</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("aiSearch").addEventListener("keyup", function(){
    let query = this.value;
    if(query.length === 0){ document.getElementById("aiResult").innerHTML = ""; return; }
    fetch("/user/ai-search?query=" + query)
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("aiResult"); list.innerHTML = "";
        data.forEach(med => {
            list.innerHTML += `<li class="list-group-item d-flex justify-content-between">💊 ${med.name} - ₹${med.price}</li>`;
        });
    });
});
</script>
</body>
</html>
