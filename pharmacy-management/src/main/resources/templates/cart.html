<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="text-center mb-4">🛒 Your Cart</h2>
    <div class="table-responsive bg-white p-3 shadow-sm">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Medicine</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.medicine.name}"></td>
                    <td>₹[[${item.medicine.price}]]</td>
                    <td>
                        <a th:href="@{/cart/decrease/{id}(id=${item.id})}" class="btn btn-sm btn-outline-warning">-</a>
                        <span class="mx-2" th:text="${item.quantity}">1</span>
                        <a th:href="@{/cart/increase/{id}(id=${item.id})}" class="btn btn-sm btn-outline-success">+</a>
                    </td>
                    <td>₹[[${item.medicine.price * item.quantity}]]</td>
                    <td>
                        <a th:href="@{/cart/delete/{id}(id=${item.id})}" class="btn btn-danger btn-sm">Remove</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="text-end mt-3">
            <h4>Total: ₹<span th:text="${total}">0</span></h4>
            <a href="/cart/checkout" class="btn btn-success px-5">Proceed to Checkout</a>
        </div>
    </div>
</div>
</body>
</html>
