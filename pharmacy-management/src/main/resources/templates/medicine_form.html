<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add / Edit Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 th:if="${medicine.id == 0}">Add Medicine</h3>
        <h3 th:unless="${medicine.id == 0}">Edit Medicine</h3>

        <form th:action="@{/medicine/save}" th:object="${medicine}" method="post">
            <div class="mb-3">
                <label>Medicine Name</label>
                <input type="text" th:field="*{name}" class="form-control">
                <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label>Category</label>
                <input type="text" th:field="*{category}" class="form-control">
                <div th:if="${#fields.hasErrors('category')}" class="text-danger" th:errors="*{category}"></div>
            </div>
            <div class="mb-3">
                <label>Price</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control">
                <div th:if="${#fields.hasErrors('price')}" class="text-danger" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" th:field="*{quantity}" class="form-control">
                <div th:if="${#fields.hasErrors('quantity')}" class="text-danger" th:errors="*{quantity}"></div>
            </div>
            <button type="submit" class="btn btn-success">Save</button>
            <a href="/medicine/list" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
