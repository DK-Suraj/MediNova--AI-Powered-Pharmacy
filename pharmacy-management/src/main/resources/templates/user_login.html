<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        /* Background */
        .bg-style {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1587854692152-cbe660dbde88');
            background-size: cover;
            background-position: center;
        }

        /* Glass Form */
        .form-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            background: #667eea;
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
        }

        .btn-outline-light { 
            border-radius: 10px; 
            padding: 0.25rem 0.75rem; 
        }
    </style>
</head>

<body>

<div class="bg-style d-flex justify-content-center align-items-center">

    <div class="form-box p-4 shadow col-md-4">

        <h3 class="text-center mb-4">🔐 User Login</h3>

        <!-- ERROR MESSAGE -->
        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/user/login}" method="post">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <!-- Links -->
        <p class="text-center mt-3">
            Don't have an account? 
            <a href="/user/register" class="text-warning">Register</a>
        </p>
        <p class="text-center mt-2">
            Or go back to 
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        </p>

    </div>

</div>

</body>
