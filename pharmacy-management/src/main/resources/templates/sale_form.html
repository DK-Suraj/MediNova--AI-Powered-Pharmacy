<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add / Edit Sale - Pharmacy Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        label { font-weight: 600; color: #444; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4 text-center">Add / Edit Sale</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            ⚠️ Stock not available for this medicine!
        </div>

        <form th:action="@{/sale/save}" th:object="${sale}" method="post">
            
			<div class="mb-3">
			    <label>Select Medicine</label>
			    <select name="medicine.id" class="form-select" required>
			        <option value="">-- Choose Medicine --</option>
			        <option th:each="m : ${medicines}" 
			                th:value="${m.id}" 
			                th:text="${m.name + ' (Price: ₹' + m.price + ' | Stock: ' + m.quantity + ')'}">
			        </option>
			    </select>
			</div>

            <div class="mb-3">
                <label>Customer Name</label>
                <input type="text" th:field="*{customerName}" class="form-control" placeholder="Enter name here..." required>
            </div>

            <div class="mb-3">
                <label>Mobile Number</label>
                <input type="text" th:field="*{phone}" class="form-control" placeholder="Enter 10-digit number" required>
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" th:field="*{quantity}" class="form-control" min="1" required>
            </div>

            <div class="mt-4 text-center">
                <button type="submit" class="btn btn-success px-5">Save Sale</button>
                <a href="/sale/list" class="btn btn-secondary px-5">Back</a>
            </div>
            
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
